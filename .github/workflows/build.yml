name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Extract zip
        run: unzip XMBrowser_v4.zip
      - name: Build APK
        run: |
          cd XMBrowser
          gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XMBrowser-APK
          path: XMBrowser/app/build/outputs/apk/debug/app-debug.apk
